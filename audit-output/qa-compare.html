<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>完成页设计对比</title>
    <style>
      body { margin: 0; padding: 24px; color: #2a1510; background: #eee5dc; font-family: sans-serif; }
      h1 { margin: 0 0 18px; font-size: 22px; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      figure { margin: 0; padding: 12px; border-radius: 12px; background: #fff; box-shadow: 0 8px 24px #6b4a3920; }
      figcaption { margin-bottom: 10px; font-weight: 700; }
      img { display: block; width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <h1>完成页：修改前与修改后</h1>
    <main>
      <figure><figcaption>修改前：只有“已完成 / 重置”</figcaption><img src="./05-complete.png" alt="修改前完成页" /></figure>
      <figure><figcaption>修改后：六阶段完成、成果总结、再造与定格</figcaption><img src="./09-updated-complete-final.png" alt="修改后完成页" /></figure>
    </main>
  </body>
</html>
